<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mini Game Platform</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #111;
      color: white;
    }
    h1 {
      margin-top: 20px;
    }
    .game-list button {
      margin: 10px;
      padding: 10px 20px;
      cursor: pointer;
    }
    iframe {
      width: 80%;
      height: 500px;
      border: none;
      margin-top: 20px;
      background: white;
    }
  </style>
</head>
<body>

<h1>🎮 My Game Platform</h1>

<div class="game-list">
  <button onclick="loadGame('game1.html')">Game 1</button>
  <button onclick="loadGame('game2.html')">Game 2</button>
</div>

<iframe id="gameFrame"></iframe>

<script>
function loadGame(gameUrl) {
  document.getElementById("gameFrame").src = gameUrl;
}
</script>

</body>
</html>
<!DOCTYPE html>
<html>
<head>
  <title>Simple Click Game</title>
</head>
<body style="text-align:center;">

<h2>Click the Button Game</h2>
<button onclick="score++ ; update()">Click me!</button>
<p id="score">Score: 0</p>

<script>
let score = 0;
function update() {
  document.getElementById("score").innerText = "Score: " + score;
}
</script>

</body>
</html>
